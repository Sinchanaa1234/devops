name: Simple CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run a simple command
        run: echo "this is the ubuntu classes" 

      - name: Step1
        run: echo "This is my step1"

      - name: Step2
        run: echo "This is my step2"

      - name: Pipeline Break
        run: echo "Pipeline is fixed"

      - name: Building docker image
        run: docker build -t devops .  

      - name: Login to GHCR
        run: echo "${{secrets.GHCR_TOKEN}}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build a Docker image
        run: docker build -t ghcr.io/${{ github.actor }}/mydoc:v1 .

      - name: Push a docker image
        run: docker push ghcr.io/${{ github.actor }}/mydoc:v1